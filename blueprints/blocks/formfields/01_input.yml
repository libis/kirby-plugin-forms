name: libis.forms.block.input.name
icon: text

fields:
  fieldlabel:
    label: libis.forms.label
    type: text
    width: 1/2
    required: true
  uniqueidentifier:
    label: libis.forms.uniqueidentifier
    type: slug
    required: true
    wizard:
      text: " "
      field: fieldlabel
    width: 1/2
  inputtype: 
    label: libis.forms.block.input.type
    type: select
    default: text
    options: 
      text: 
        *: libis.forms.block.input.type.option.text
      number: 
        *: libis.forms.block.input.type.option.number
      email: 
        *: libis.forms.block.input.type.option.email
      tel: 
        *: libis.forms.block.input.type.option.tel
      url: 
        *: libis.forms.block.input.type.option.url
  placeholder:
    label: libis.forms.placeholder
    type: text
    width: 1/2
  required:
    label: libis.forms.required
    type: toggle
    width: 1/2
  size:
    label: libis.forms.size.width
    type: select
    default: 1/1
    options:
      1/1: 1/1
      1/2: 1/2
    width: 1/2