name: libis.forms.block.select.name
icon: text-justify

fields:
  fieldlabel:
    label: libis.forms.label
    type: text
    width: 1/2
    required: true
  uniqueidentifier:
    label: libis.forms.uniqueidentifier
    type: slug
    required: true
    wizard:
      text: " "
      field: fieldlabel
    width: 1/2
  required:
    label: libis.forms.required
    type: toggle
    width: 1/2
  size:
    label: libis.forms.size.width
    type: select
    default: 1/1
    options:
      1/1: 1/1
      1/2: 1/2
    width: 1/2
  optiontype:
    label: libis.forms.type
    type: select
    default: normal
    options: 
      normal: 
        *: libis.forms.block.select.type.normal
      email:
        *: libis.forms.block.select.type.mail
  optionsnormal:
    label: libis.forms.options
    type: blocks
    pretty: true
    fieldsets:
      - selectOption
    when: 
      optiontype: normal
  optionsemail:
    label: libis.forms.options
    type: blocks
    pretty: true
    fieldsets:
      - selectOptionEmail
    when: 
      optiontype: email